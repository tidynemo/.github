name: Docker Deploy

on:
  workflow_call:
    inputs:
      pkg_version:
        required: true
        type: string

jobs:
  docker_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      packages: write

    steps:
      # assumes already tagged version
      - name: 🚚 Code checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ inputs.pkg_version }}
      - name: 🏰 QEMU setup
        uses: docker/setup-qemu-action@v4
      - name: 🏯 Buildx setup
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
      - name: 🐙 GitHub CR login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🐳 Docker img build and push
        uses: docker/build-push-action@v7
        with:
          tags: ghcr.io/${{ github.repository }}:${{ inputs.pkg_version }}
          context: .
          push: true
          platforms: linux/amd64
