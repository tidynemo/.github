name: Bump Version

on:
  workflow_call:
    inputs:
      pkg_name:
        required: true
        type: string
      pkg_version:
        required: true
        type: string
      dir_conda_env_yaml:
        required: false
        type: string
        default: deploy/conda/env/yaml

jobs:
  bump:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      contents: write
    steps:
      - name: 🤖 Generate app token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app_id: ${{ vars.BOT1_APP_ID }}
          private_key: ${{ secrets.BOT1_APP_PRIVATE_KEY }}
      - name: 🚚 Code checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: 👾 Miniforge setup
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: ${{ inputs.dir_conda_env_yaml }}/pkgdown.yaml
          activate-environment: pkgdown_env
          miniforge-version: latest
      - name: 📦 Install R pkg from source
        run: R CMD INSTALL --no-test-load .
      - name: 🐍 Install bump-my-version
        run: pip install bump-my-version
      - name: 🔖 Bump version
        env:
          APP_ID: ${{ vars.BOT1_APP_ID }}
        run: |
          git config --local user.email "${APP_ID}+tidywf-ci-bot[bot]@users.noreply.github.com"
          git config --local user.name "tidywf-ci-bot[bot]"
          bump-my-version bump --new-version ${{ inputs.pkg_version }}
      - name: 📖 Render README
        run: quarto render README.qmd
      - name: 💾 Amend commit
        run: |
          git add README.md
          git commit --amend --no-edit
      - name: 🚀 Push
        run: git push
